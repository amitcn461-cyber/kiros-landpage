<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KIROS — Reel</title>
<link rel="stylesheet" href="reel/colors_and_type.css" />
<meta name="ext-resource-dependency" content="reel/kiros-mark.png" data-resource-id="kmark" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  * { box-sizing: border-box; }
  #reel-root { position: fixed; inset: 0; }
  #root { position: absolute; inset: 0; }

  @keyframes kt {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50%      { transform: translateY(-5px); opacity: 1; }
  }
  @keyframes kpulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.45); opacity: 0.55; }
  }
  @keyframes kshake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(3px); }
  }
  @keyframes kpop {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#06050A">
  <svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="kbg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#0B0916"/><stop offset="1" stop-color="#06050A"/>
      </linearGradient>
      <linearGradient id="kk" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.5" stop-color="#DCD3FF"/><stop offset="1" stop-color="#C4B6FD"/>
      </linearGradient>
    </defs>
    <rect width="1080" height="1920" fill="url(#kbg)"/>
    <circle cx="540" cy="960" r="430" fill="rgba(124,92,255,0.25)"/>
    <text x="540" y="1110" font-family="'Space Grotesk',sans-serif" font-size="640" font-weight="700" fill="url(#kk)" text-anchor="middle">K</text>
  </svg>
</template>

<div id="reel-root" data-screen-label="t=0s">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="reel/sfx.js"></script>
<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="reel/phone.jsx"></script>
<script type="text/babel" src="reel/dashboard.jsx"></script>
<script type="text/babel" src="reel/scenes1.jsx"></script>
<script type="text/babel" src="reel/scenes2.jsx"></script>
<script type="text/babel" src="reel/app.jsx"></script>
</body>
</html>
